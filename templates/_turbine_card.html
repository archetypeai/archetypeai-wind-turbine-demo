{# Reusable card layout for one turbine. The .panel wrapper supplies data-wt. #}
<header class="panel-head">
    <h2>WT<span class="wt-id"></span></h2>
    <div class="badges">
        <div class="state-badge"><span class="state-dot"></span><span class="state-label">analysing</span></div>
        <div class="newton-verdict" title="Latest Archetype AI Newton lens prediction">
            <span class="nv-tag">Newton</span><span class="nv-class">—</span><span class="nv-votes"></span>
        </div>
    </div>
</header>

<svg class="turbine" viewBox="-90 -100 180 260" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <defs>
        <linearGradient id="tower-{{ card_id }}" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#3a414c" />
            <stop offset="50%" stop-color="#5a626f" />
            <stop offset="100%" stop-color="#2a313c" />
        </linearGradient>
        <linearGradient id="nacelle-{{ card_id }}" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#6c7585" />
            <stop offset="100%" stop-color="#3a414c" />
        </linearGradient>
    </defs>
    {# Ground line #}
    <line x1="-80" y1="140" x2="80" y2="140" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    {# Tower (tapered) #}
    <path d="M -3 0 L 3 0 L 7 140 L -7 140 Z" fill="url(#tower-{{ card_id }})" />
    {# Nacelle #}
    <ellipse cx="0" cy="-4" rx="22" ry="9" fill="url(#nacelle-{{ card_id }})" />
    <rect x="-22" y="-6" width="6" height="6" fill="rgba(0,0,0,0.4)" rx="2"/>
    {# Rotor — rotated dynamically via the transform attribute from JS #}
    <g class="rotor" transform="rotate(0 0 0)">
        <g class="blade-group">
            <path class="blade" d="M 0 0 L 5 -8 L 4 -45 L 0 -80 L -4 -45 L -5 -8 Z" />
        </g>
        <g class="blade-group" transform="rotate(120 0 0)">
            <path class="blade" d="M 0 0 L 5 -8 L 4 -45 L 0 -80 L -4 -45 L -5 -8 Z" />
        </g>
        <g class="blade-group" transform="rotate(240 0 0)">
            <path class="blade" d="M 0 0 L 5 -8 L 4 -45 L 0 -80 L -4 -45 L -5 -8 Z" />
        </g>
        <circle r="6" class="hub" />
        <circle r="2" cx="0" cy="0" fill="rgba(255,255,255,0.6)" />
    </g>
</svg>

<div class="stats">
    <div class="stat power">
        <div class="stat-label">Power</div>
        <div class="stat-value"><span class="val" data-field="power">0</span> <span class="unit">kW</span></div>
        <div class="bar"><div class="bar-fill"></div></div>
    </div>
    <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value"><span class="val" data-field="wind">—</span> <span class="unit">m/s</span></div>
    </div>
    <div class="stat">
        <div class="stat-label">Rotor</div>
        <div class="stat-value"><span class="val" data-field="rpm">—</span> <span class="unit">rpm</span></div>
    </div>
    <div class="stat">
        <div class="stat-label">Pitch</div>
        <div class="stat-value"><span class="val" data-field="pitch">—</span> <span class="unit">°</span></div>
    </div>
    <div class="stat">
        <div class="stat-label">Gear oil</div>
        <div class="stat-value"><span class="val" data-field="gear_c">—</span> <span class="unit">°C</span></div>
    </div>
</div>

<div class="spark">
    <canvas></canvas>
</div>
